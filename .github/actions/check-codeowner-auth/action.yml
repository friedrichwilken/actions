name: Check codeowner authorization
description: >-
  Authorizes pull_request_target and pull_request_review workflow runs by
  checking whether the PR author or a reviewer is a member of a team listed
  in the repository's CODEOWNERS file. Designed as a programmatic substitute
  for GitHub environment approval gates on privileged workflows.

  Emits `head-sha` as an output so downstream jobs can pin
  `actions/checkout` to the vetted commit and avoid force-push races.

inputs:
  github-token:
    description: >-
      Installation token from a GitHub App with `Members: Read` and
      `Contents: Read` on the org. Do NOT pass `GITHUB_TOKEN` — it lacks
      the org-team scope required for membership checks. The recommended
      pattern is to mint this token in the same job via
      `actions/create-github-app-token`, pinned to a full commit SHA.
    required: true
  trusted-bot-ids:
    description: >-
      Comma-separated list of numeric GitHub user IDs that are always
      authorized as PR authors. Use numeric IDs, not logins — logins can
      be re-registered after deletion. Each entry MUST be a bot account
      (verified via `user.type === 'Bot'` at runtime). Example:
      `29139614` for renovate[bot].
    required: false
    default: ''
  allow-individual-owners:
    description: >-
      TEMPORARY bridge. When 'true', individual `@handle` entries in
      CODEOWNERS also authorize (the PR author or an approver whose login
      matches a listed handle), in addition to `@org/team` membership. This
      exists so the action can run in a context that has no organization
      teams — e.g. a personal account — before it moves to its org home.
      Leave this UNSET / 'false' in an org: teams are the intended
      permanent model, and this flag will be removed once the action lives
      in an org. Reads the same base-ref CODEOWNERS as the team path, so a
      PR cannot self-authorize by adding its own handle.
    required: false
    default: 'false'

outputs:
  head-sha:
    description: >-
      The PR head commit SHA that was authorized. Downstream jobs MUST
      use this value for `actions/checkout` — never `github.head_ref`
      (branch name, re-resolves at checkout time) or `refs/pull/N/merge`
      (re-merges live). Pinning to this SHA is what prevents mid-run
      force-push bypasses.
    value: ${{ steps.authorize.outputs.head-sha }}
  outcome:
    description: >-
      Machine-readable authorization result, set on every run. One of:
      `authorized_trusted_bot`, `authorized_author`, `authorized_approval`,
      `denied_unsupported_event`, `denied_missing_pr`,
      `denied_malformed_payload`, `denied_missing_codeowners`,
      `denied_no_team_codeowners`, `denied_no_approval`, `denied_api_error`,
      `denied_config_error` (bad token or unreadable/malformed event, set
      before the gate runs).
    value: ${{ steps.authorize.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.14'
        cache: 'pip'
        cache-dependency-path: ${{ github.action_path }}/requirements.txt

    - name: Install dependencies
      shell: bash
      # --require-hashes: every dependency (including the full transitive
      # closure) must match a hash pinned in requirements.txt, which is
      # generated by `pip-compile --generate-hashes` from requirements.in.
      # pip refuses to install anything not hash-matched — closing the
      # supply-chain window in the job that holds the App token. No
      # OR-fallback: a hash mismatch must fail the run, not silently
      # degrade to an unpinned install.
      run: pip install --require-hashes -r "${{ github.action_path }}/requirements.txt"

    - name: Authorize
      id: authorize
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_TRUSTED_BOT_IDS: ${{ inputs.trusted-bot-ids }}
        INPUT_ALLOW_INDIVIDUAL_OWNERS: ${{ inputs.allow-individual-owners }}
      run: python -m main
