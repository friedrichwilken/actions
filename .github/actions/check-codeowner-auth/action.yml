name: Check codeowner authorization
description: >-
  Authorizes pull_request_target and pull_request_review workflow runs by
  checking whether the PR author or a reviewer is a member of a team listed
  in the repository's CODEOWNERS file. Designed as a programmatic substitute
  for GitHub environment approval gates on privileged workflows.

  Emits `head-sha` as an output so downstream jobs can pin
  `actions/checkout` to the vetted commit and avoid force-push races.

inputs:
  github-token:
    description: >-
      Installation token from a GitHub App with `Members: Read` and
      `Contents: Read` on the org. Do NOT pass `GITHUB_TOKEN` — it lacks
      the org-team scope required for membership checks. The recommended
      pattern is to mint this token in the same job via
      `actions/create-github-app-token`, pinned to a full commit SHA.
    required: true
  trusted-bot-ids:
    description: >-
      Comma-separated list of numeric GitHub user IDs that are always
      authorized as PR authors. Use numeric IDs, not logins — logins can
      be re-registered after deletion. Each entry MUST be a bot account
      (verified via `user.type === 'Bot'` at runtime). Example:
      `29139614` for renovate[bot].
    required: false
    default: ''

outputs:
  head-sha:
    description: >-
      The PR head commit SHA that was authorized. Downstream jobs MUST
      use this value for `actions/checkout` — never `github.head_ref`
      (branch name, re-resolves at checkout time) or `refs/pull/N/merge`
      (re-merges live). Pinning to this SHA is what prevents mid-run
      force-push bypasses.
    value: ${{ steps.authorize.outputs.head-sha }}
  outcome:
    description: >-
      Machine-readable authorization result. One of: `authorized_trusted_bot`,
      `authorized_author`, `authorized_approval`, `denied_unsupported_event`,
      `denied_missing_pr`, `denied_malformed_payload`,
      `denied_missing_codeowners`, `denied_no_team_codeowners`,
      `denied_no_approval`, `denied_api_error`.
    value: ${{ steps.authorize.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: '3.14'
        cache: 'pip'
        cache-dependency-path: ${{ github.action_path }}/requirements.txt

    - name: Install dependencies
      shell: bash
      # Note: hash pinning via `pip-compile --generate-hashes` is a future
      # hardening step. When we add hashes to requirements.txt, switch this
      # to `pip install --require-hashes -r ...` with no OR-fallback — the
      # fallback is what makes hash pinning inert.
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Authorize
      id: authorize
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_TRUSTED_BOT_IDS: ${{ inputs.trusted-bot-ids }}
      run: python -m main
