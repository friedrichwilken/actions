name: CI

on:
  # Deliberately `pull_request`, not `pull_request_target`. This repo's own
  # CI must not have access to secrets on fork PR runs. The auth-gate
  # action's whole reason to exist is that `pull_request_target` is
  # dangerous — using it here would be self-refuting.
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Zero permissions by default. Individual jobs re-add the narrow scope they need.
permissions: {}

jobs:
  check-codeowner-auth:
    name: check-codeowner-auth (${{ matrix.job }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .github/actions/check-codeowner-auth
    strategy:
      fail-fast: false
      matrix:
        job: [lint, format, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: .github/actions/check-codeowner-auth/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        if: matrix.job == 'lint'
        run: ruff check .

      - name: Format check
        if: matrix.job == 'format'
        run: ruff format --check .

      - name: Test
        if: matrix.job == 'test'
        run: pytest -v
