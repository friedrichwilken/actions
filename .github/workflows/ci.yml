name: CI

on:
  # Deliberately `pull_request`, not `pull_request_target`. This repo's own
  # CI must not have access to secrets on fork PR runs. The auth-gate
  # action's whole reason to exist is that `pull_request_target` is
  # dangerous — using it here would be self-refuting.
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Zero permissions by default. Individual jobs re-add the narrow scope they need.
permissions: {}

jobs:
  check-codeowner-auth:
    name: check-codeowner-auth (${{ matrix.job }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .github/actions/check-codeowner-auth
    strategy:
      fail-fast: false
      matrix:
        job: [lint, format, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: .github/actions/check-codeowner-auth/requirements-dev.txt

      - name: Install dependencies
        run: |
          # Runtime deps install with --require-hashes, the same way the
          # action installs them at runtime — so CI fails if the hashed lock
          # is stale or tampered. Dev deps (ruff/pytest/etc.) are not hashed
          # and install separately; pip's all-or-nothing hash rule applies
          # per -r invocation, so the two calls don't conflict.
          pip install --require-hashes -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint
        if: matrix.job == 'lint'
        run: ruff check .

      - name: Format check
        if: matrix.job == 'format'
        run: ruff format --check .

      - name: Test
        if: matrix.job == 'test'
        run: pytest -v
